name: deploy-dockerhub

on:
  workflow_run:
    workflows: ["sonar"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # BACKEND IMAGE
      # =========================
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest ./back
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:${{ github.sha }}

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:${{ github.sha }}

      # =========================
      # FRONTEND IMAGE
      # =========================
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest ./front
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:${{ github.sha }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:${{ github.sha }}