name: sonar

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["tests-backend", "tests-frontend"]
    types:
      - completed

jobs:
  sonar-back:
    name: SonarCloud Backend
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ======================
      # BACKEND
      # ======================
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build & test backend
        working-directory: back
        run: mvn clean verify

      - name: Debug backend coverage
        run: |
          echo "=== BACK COVERAGE ==="
          find back -name "jacoco.xml"
          ls -R back/target/site || true

      - name: SonarCloud Scan Backend
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: back

  sonar-front:
    name: SonarCloud Frontend
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: front
        run: npm ci --ignore-scripts

      - name: Run frontend tests with coverage
        working-directory: front
        run: npm run test -- --watch=false --browsers=ChromeHeadlessCI --code-coverage

      - name: Debug frontend coverage
        run: |
          echo "=== FRONT COVERAGE ==="
          find front -name "lcov.info"
          ls -R front/coverage || true

      - name: SonarCloud Scan Frontend
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: front